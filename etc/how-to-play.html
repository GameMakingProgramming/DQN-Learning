<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブロック崩し</title>
    <link rel="stylesheet" href="cursor.css">

    <link rel="stylesheet" href="how-to-play.css">
    
    <link rel="stylesheet" href="../game-css/main.css">
    <link rel="stylesheet" href="../game-css/monitor.css">
    <link rel="stylesheet" href="../game-css/control.css">
    <link rel="stylesheet" href="../game-css/speed.css">
    <link rel="stylesheet" href="../game-css/epsilon.css">
    <link rel="stylesheet" href="../game-css/neuron.css">
    <link rel="stylesheet" href="../game-css/menu.css">
    <link rel="stylesheet" href="../game-css/data.css">
</head>

<body>
    <!-- カーソルデザイン -->
    <div id="startMenuCursorSf"></div>
    <div id="startMenuCursorLight"></div>    

    <!-- ゲーム画面 -->
    <div id="main" class="main">
        <!-- コントロールパネル -->
        <div class="control-panel">
            <div class="situation highlight" data-text="バーの大きさや速さ、ボールの大きさや速さを変えられます\nいろいろなステータスで遊ばせてみてください">
                <p>状況</p>
                <div class="control-item">
                    <p>バー</p>
                    <div class="items">
                        <span>小</span>
                        <input id="paddleWidth" class="clickable" type="range" max="100" min="0" step="1" value="50">
                        <span>大</span>
                    </div>
                    <div class="items">
                        <span>遅</span>
                        <input id="paddleSpeed" class="clickable" type="range" max="100" min="0" step="1" value="50">
                        <span>速</span>
                    </div>
                </div>
                <div class="control-item">
                    <p>ボール</p>
                    <div class="items">
                        <span>小</span>
                        <input id="ballSize" class="clickable" type="range" max="100" min="0" step="1" value="8">
                        <span>大</span>
                    </div>
                    <div class="items">
                        <span>遅</span>
                        <input id="ballSpeed" class="clickable" type="range" max="100" min="0" step="1" value="12">
                        <span>速</span>
                    </div>
                </div>
                <!-- <div class="control-item">　重力
                    <p>Gravity</p>
                    <div class="items">
                        <label><input type="radio" name="gravity" checked><span>無重力</span></label>
                        <label><input id="gravity" type="radio" name="gravity"><span>重力</span></label>
                    </div>
                </div> -->
            </div>
            <div class="perspnality">
                <p class="control-item highlight" data-text="性格を変えられます\n割引率も学習率もバランスが大事ですが\n極端にして観察してみるのも面白いかも">性格</p>
                <form id="perspnalityF">
                    <div class="control-item highlight" data-text="『割引率Gamma』は、1秒後に100円もらえるのと10年後に10,000円もらえるのどっちがいい？\nみたいな話です">
                        <p>割引率Gamma</p>
                        <div class="items">
                            <span>目先</span>
                            <input id="gamma" class="clickable" type="range" max="100" min="0" step="1" value="81.5">
                            <span>未来</span>
                        </div>
                    </div>
                    <div class="control-item highlight" data-text="『学習率Learning Rate』は、今起きた出来事をどれくらい重視するかです\n例えば成功したとき(こうすれば成功するんだ！)と鵜吞みにするか\n(これはまぐれだったんじゃないのか...？)と疑ってかかるか\nみたいな感じです">
                        <p>学習率Learning Rate</p>
                        <div class="items">
                            <span>素直</span>
                            <input id="learningRate" class="clickable" type="range" max="100" min="0" step="1" value="50">
                            <span>慎重</span>
                        </div>
                    </div>
                </form>
                <div class="reset-btn lowlight"><input type="reset" form="perspnalityF" id="perspnalityResetBtn" class="clickable" value="リセット"></div>
                <div class="control-item highlight" data-text="報酬を設定できます(マイナスだと罰)\n時間は時間経過、落下はミスしたとき、破壊はブロック壊したとき、\n打返はボールを打ち返したとき、全消はブロック全部消したとき\nバランスが大事で右のニューロンモニターの光が忙しくピカピカしてるとグッドバランスです">
                    <p>報酬Reward</p>
                    <form id="RewardF">
                        <div class="items rewards">
                            <span>時間</span><input id="rewardInput1" type="number" value="0" class="reward">
                            <span>落下</span><input id="rewardInput2" type="number" value="-2" class="reward">
                            <span>破壊</span><input id="rewardInput3" type="number" value="1" class="reward">
                            <span>打返</span><input id="rewardInput4" type="number" value="0.5" class="reward">
                            <span>全消</span><input id="rewardInput5" type="number" value="5" class="reward">
                        </div>
                    </form>
                </div>
                <div class="reward-btn lowlight">
                    <div class="reset-btn"><input type="reset" form="RewardF" id="rewardResetBtn" class="clickable" value="リセット"></div>
                    <div class="reset-btn"><input type="button" id="rewardUpdateBtn" class="clickable" value="更新"></div>
                </div>
            </div>
        </div>
        <!-- ブロック崩し画面 -->
        <div class="game highlight" data-text="ブロック崩しのモニターです">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <p>Deep Q-Network</p>
        </div>
        <!-- イプシロン率 -->
        <div class="epsilon highlight" data-text="イプシロン率epsilonです\n強化学習は行動するとき一番始めに『探索』か『活用』を選択します\n『探索』は完全にランダムに行動して、『活用』は学んできた知識を活かし行動します\n例えば、イプシロン率80%だと『探索80%,活用20%』になります\n時間経過でイプシロン率を下げていくのが一般的ですが\nいろいろいじれるようになってるのでお好きなように">
            <p class="epsilon-title">epsilon</p>
            <input type="range" class="clickable epsilon-range" value="100" min="0" max="100" id="epsilonRange" step="1">
            <div class="bar-percent"><p>100%</p><p>50%</p><p>0%</p></div>
            <p class="epsilon-percent" id="epsilonPercent">100%</p>
            <!-- <label class="epsilon-check"><input type="checkbox" id="epsilonFix"><p>固定</p></label> -->
            <div class="epsilon-speed">
                <input type="range" id="epsilonFix" class="clickable" max="3" min="0" step="1" value="1">
                <ul>
                    <li>高速</li>
                    <li>中速</li>
                    <li>低速</li>
                    <li>固定</li>
                </ul>
            </div>
        </div>
        <!-- ニューロン -->
        <div class="neuron">
            <p class="neuron-canvas-hidden highlight" data-text="上のモニターが中間層です\n下のモニターが出力層です">ニューロンモニター</p>
            <canvas class="neuron-canvas-hidden highlight" data-text="中間層です\nピカピカしてるのはニューロンといって\n入力データから特徴を見つけてくれます\n激しくピカピカしているほど学習がうまく進んでいて\n逆にずっと光りっぱなし、ずっと暗いと学習がうまく進んでないです" id="neuronCanvasHidden"></canvas>
            <canvas class="neuron-canvas-output highlight" data-text="出力層です\n伸び縮みしているのはニューロンで\n中間層からもらった特徴のデータから一番有効的な行動(出力)を見つけ出します" id="neuronCanvasOutput"></canvas>
            <div class="neuron-select">
                <div class="neuron-left"><p>Left</p><p class="neuron-value" id="neuronLeftValue">0</p></div>
                <div class="neuron-stay"><p>Stay</p><p class="neuron-value" id="neuronStayValue">0</p></div>
                <div class="neuron-right"><p>Right</p><p class="neuron-value" id="neuronRightValue">0</p></div>
            </div>
        </div>
         <!-- データ管理 -->
         <div class="data-control">
            <button class="clickable highlight" data-text="データを保存したりできます\nエクスポートはデータをファイルに保存して共有したりできます\nインポートはファイルを適応できます\n2つのファイルを選択して開いてください" id="dataControlBtn">データ</button>
        </div>
        <div class="data-menu data-hidden" id="dataMenu">
            <button class="clickable close" id="closeBtn">×</button>
            <button class="clickable" id="saveBtn">セーブ</button>
            <button class="clickable" id="loadBtn">ロード</button>
            <label><input type="file" class="clickable" id="importBtn" multiple style="display: none;">インポート</label>
            <button class="clickable" id="exportBtn">エクスポート</button>
            <button class="clickable" id="nnResetBtn">リセット</button>
        </div>
        <div class="data-hidden" id="overlay"></div>
        <div class="hop-up data-hidden" id="hopUp">セーブしました</div>
        <!-- スピードパネル -->
        <div class="speed-panel-border"><div class="speed-panel highlight" data-text="学習スピードを変えられます\n重さ回避のため倍速すると描画を落としてます\n動きを見たい場合は等速にしてね"><div class="speed-panel-shadow">
            <div class="percent-border"><div class="percent">
                <div class="v"><span id="speedDisplay">100%</span></div>
                <div class="l"><span>speed</span></div>
            </div></div>
            <button class="clickable speed-btn-border"><div class="speed-btn"><span>1x</span></div></button>
            <button class="clickable speed-btn-border"><div class="speed-btn"><span>2x</span></div></button>
            <button class="clickable speed-btn-border"><div class="speed-btn"><span>5x</span></div></button>
            <button class="clickable speed-btn-border"><div class="speed-btn"><span>10x</span></div></button>
            <button class="clickable speed-btn-border"><div class="speed-btn"><span>100x</span></div></button>
        </div></div></div>
        <!-- メニュー -->
        <div class="menu highlight" data-text="メニュー画面です\n文字通りです">
            <ul>
                <li><button id="startBtn" class="clickable">スタート</button></li>
                <li><button id="stopBtn" class="clickable">ストップ</button></li>
                <li><button id="endBtn" class="clickable">終了</button></li>
            </ul>
        </div>
    </div>
    <div class="container">
        <div id="textContainer" class="text-container">このゲームは<br>AIがブロック崩しを学習して遊んでいるところを見守るゲームです<br>画面にカーソルを合わせると説明を表示します</div>
    </div>
    <script src="cursor.js"></script>
    <script src="how-to-play.js"></script>
</body>
</html>
